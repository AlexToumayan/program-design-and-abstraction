<svg xmlns="http://www.w3.org/2000/svg" viewBox="-16 -16 730 392" font-family="-apple-system, 'Segoe UI', Helvetica, sans-serif">
  <!-- ===================== LEFT ARM: calls go deeper (blue, descending) ===================== -->
  <!-- fact(4) -->
  <rect x="40" y="34" width="120" height="44" rx="12" fill="#ffffff" stroke="#268bd2" stroke-width="2"/>
  <text x="100" y="62" text-anchor="middle" font-size="20" font-family="monospace" fill="#073642">fact(4)</text>
  <!-- fact(3) -->
  <rect x="92" y="110" width="120" height="44" rx="12" fill="#ffffff" stroke="#268bd2" stroke-width="2"/>
  <text x="152" y="138" text-anchor="middle" font-size="20" font-family="monospace" fill="#073642">fact(3)</text>
  <!-- fact(2) -->
  <rect x="144" y="186" width="120" height="44" rx="12" fill="#ffffff" stroke="#268bd2" stroke-width="2"/>
  <text x="204" y="214" text-anchor="middle" font-size="20" font-family="monospace" fill="#073642">fact(2)</text>

  <!-- left down-arrows (blue) -->
  <line x1="118" y1="78" x2="146" y2="106" stroke="#268bd2" stroke-width="2.5"/>
  <polygon points="138,104 149,109 144,98" fill="#268bd2"/>
  <line x1="170" y1="154" x2="198" y2="182" stroke="#268bd2" stroke-width="2.5"/>
  <polygon points="190,180 201,185 196,174" fill="#268bd2"/>
  <line x1="222" y1="230" x2="250" y2="258" stroke="#268bd2" stroke-width="2.5"/>
  <polygon points="242,256 253,261 248,250" fill="#268bd2"/>

  <!-- left arm label -->
  <text x="60" y="150" text-anchor="middle" font-size="13" font-family="monospace" fill="#268bd2" transform="rotate(-90 60 150)">calls go deeper</text>

  <!-- ===================== BOTTOM: base case + turnaround ===================== -->
  <rect x="256" y="262" width="168" height="56" rx="14" fill="#fdf6e3" stroke="#073642" stroke-width="2.5"/>
  <text x="340" y="289" text-anchor="middle" font-size="22" font-family="monospace" font-weight="bold" fill="#073642">fact(1) = 1</text>
  <text x="340" y="309" text-anchor="middle" font-size="12" fill="#657b83">base case: stop here</text>
  <text x="340" y="342" text-anchor="middle" font-size="13" fill="#93a1a1">the recursion turns around</text>

  <!-- turnaround: hand the answer 1 up into the right arm (fact(1) returns 1) -->
  <line x1="424" y1="276" x2="502" y2="234" stroke="#2aa198" stroke-width="2.5"/>
  <polygon points="498,244 506,232 493,234" fill="#2aa198"/>
  <text x="446" y="250" text-anchor="middle" font-size="14" font-family="monospace" fill="#2aa198">1</text>

  <!-- ===================== RIGHT ARM: answers come back up (cyan, ascending) ===================== -->
  <!-- returns 2 -->
  <rect x="468" y="186" width="120" height="44" rx="12" fill="#ffffff" stroke="#2aa198" stroke-width="2"/>
  <text x="528" y="214" text-anchor="middle" font-size="20" font-family="monospace" fill="#073642">2</text>
  <!-- returns 6 -->
  <rect x="520" y="110" width="120" height="44" rx="12" fill="#ffffff" stroke="#2aa198" stroke-width="2"/>
  <text x="580" y="138" text-anchor="middle" font-size="20" font-family="monospace" fill="#073642">6</text>
  <!-- returns 24 -->
  <rect x="544" y="34" width="120" height="44" rx="12" fill="#ffffff" stroke="#2aa198" stroke-width="2"/>
  <text x="604" y="62" text-anchor="middle" font-size="20" font-family="monospace" fill="#073642">24</text>

  <!-- right up-arrows (cyan) -->
  <line x1="514" y1="186" x2="486" y2="158" stroke="#2aa198" stroke-width="2.5"/>
  <polygon points="494,160 483,155 488,166" fill="#2aa198"/>
  <line x1="566" y1="110" x2="538" y2="82" stroke="#2aa198" stroke-width="2.5"/>
  <polygon points="546,84 535,79 540,90" fill="#2aa198"/>

  <!-- right arm label -->
  <text x="620" y="150" text-anchor="middle" font-size="13" font-family="monospace" fill="#2aa198" transform="rotate(90 620 150)">answers come back up</text>

  <!-- ===================== CAPTION ===================== -->
  <text x="340" y="20" text-anchor="middle" font-size="13" fill="#93a1a1">go down to the base case, then multiply back up.</text>
</svg>

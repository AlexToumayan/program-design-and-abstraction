<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 300" font-family="-apple-system, 'Segoe UI', Helvetica, sans-serif">
  <!-- ===== machine box: print(2) ===== -->
  <rect x="40" y="108" width="210" height="92" rx="16" fill="#fdf6e3" stroke="#073642" stroke-width="2.5"/>
  <text x="145" y="150" text-anchor="middle" font-size="26" font-family="monospace" font-weight="bold" fill="#073642">print(2)</text>
  <text x="145" y="178" text-anchor="middle" font-size="12" fill="#657b83">does two separate things</text>

  <!-- ===== branch 1: shows on the screen (blue, upper) ===== -->
  <line x1="250" y1="132" x2="430" y2="80" stroke="#268bd2" stroke-width="2.5"/>
  <polygon points="425,72 437,78 426,86" fill="#268bd2"/>
  <text x="335" y="86" text-anchor="middle" font-size="13" fill="#268bd2">shows on the screen</text>

  <!-- screen / console destination -->
  <rect x="444" y="44" width="150" height="78" rx="12" fill="#ffffff" stroke="#268bd2" stroke-width="2"/>
  <!-- console title bar -->
  <line x1="444" y1="66" x2="594" y2="66" stroke="#268bd2" stroke-width="2"/>
  <circle cx="458" cy="55" r="3.5" fill="#93a1a1"/>
  <circle cx="470" cy="55" r="3.5" fill="#93a1a1"/>
  <circle cx="482" cy="55" r="3.5" fill="#93a1a1"/>
  <text x="519" y="102" text-anchor="middle" font-size="26" font-family="monospace" fill="#073642">2</text>
  <text x="519" y="140" text-anchor="middle" font-size="12" fill="#93a1a1">the screen</text>

  <!-- ===== branch 2: returns the value (cyan, lower) ===== -->
  <line x1="250" y1="176" x2="430" y2="228" stroke="#2aa198" stroke-width="2.5"/>
  <polygon points="426,222 437,230 425,236" fill="#2aa198"/>
  <text x="335" y="246" text-anchor="middle" font-size="13" fill="#2aa198">returns the value</text>

  <!-- return value box -->
  <rect x="448" y="205" width="120" height="46" rx="10" fill="#ffffff" stroke="#2aa198" stroke-width="2"/>
  <text x="508" y="235" text-anchor="middle" font-size="22" font-family="monospace" fill="#073642">None</text>
  <text x="508" y="269" text-anchor="middle" font-size="12" fill="#93a1a1">the return value</text>

  <!-- ===== caption ===== -->
  <text x="340" y="294" text-anchor="middle" font-size="13" fill="#93a1a1">print does two separate things: it shows 2 on the screen AND returns None.</text>
</svg>

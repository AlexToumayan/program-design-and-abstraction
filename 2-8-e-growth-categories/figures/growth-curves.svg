<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 318" font-family="-apple-system, 'Segoe UI', Helvetica, sans-serif">
  <!-- ===== axes ===== -->
  <!-- y axis (work) -->
  <line x1="92" y1="262" x2="92" y2="34" stroke="#073642" stroke-width="2.5"/>
  <polygon points="86,42 92,30 98,42" fill="#073642"/>
  <text x="92" y="22" text-anchor="middle" font-size="14" fill="#073642">work</text>

  <!-- x axis (input size n) -->
  <line x1="92" y1="262" x2="556" y2="262" stroke="#073642" stroke-width="2.5"/>
  <polygon points="548,256 560,262 548,268" fill="#073642"/>
  <text x="320" y="284" text-anchor="middle" font-size="14" fill="#073642">input size n</text>

  <!-- ===== curves: each rises from lower left, labeled directly at its right end ===== -->

  <!-- exponential: near-vertical, the runaway curve (soft-red contrast) -->
  <path d="M 92 262 C 150 259, 196 253, 214 196 S 234 52, 240 40" fill="none" stroke="#dc322f" stroke-width="2.5" stroke-linecap="round"/>
  <text x="246" y="44" text-anchor="start" font-size="13" font-family="monospace" fill="#dc322f">exponential</text>

  <!-- quadratic: steeply rising (blue) -->
  <path d="M 92 262 C 200 257, 300 240, 380 190 S 472 92, 504 58" fill="none" stroke="#268bd2" stroke-width="2.5" stroke-linecap="round"/>
  <text x="510" y="56" text-anchor="start" font-size="13" font-family="monospace" fill="#268bd2">quadratic</text>

  <!-- linear: straight diagonal (cyan) -->
  <line x1="92" y1="262" x2="521" y2="108" stroke="#2aa198" stroke-width="2.5" stroke-linecap="round"/>
  <text x="527" y="109" text-anchor="start" font-size="13" font-family="monospace" fill="#2aa198">linear</text>

  <!-- logarithmic: slowly rising (muted grey) -->
  <path d="M 92 262 C 150 212, 240 188, 350 176 S 482 169, 521 168" fill="none" stroke="#657b83" stroke-width="2.5" stroke-linecap="round"/>
  <text x="527" y="172" text-anchor="start" font-size="13" font-family="monospace" fill="#657b83">logarithmic</text>

  <!-- constant: flat (muted grey) -->
  <line x1="92" y1="232" x2="521" y2="232" stroke="#93a1a1" stroke-width="2.5" stroke-linecap="round"/>
  <text x="527" y="236" text-anchor="start" font-size="13" font-family="monospace" fill="#93a1a1">constant</text>

  <!-- ===== caption (two lines, centered) ===== -->
  <text x="340" y="304" text-anchor="middle" font-size="12" fill="#93a1a1">the common growth categories, from slowest-growing (constant)</text>
  <text x="340" y="316" text-anchor="middle" font-size="12" fill="#93a1a1">to fastest (exponential).</text>
</svg>

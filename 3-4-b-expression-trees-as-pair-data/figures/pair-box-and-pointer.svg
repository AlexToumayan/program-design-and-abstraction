<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 220" font-family="-apple-system, 'Segoe UI', Helvetica, sans-serif">
  <!-- faint expression label above the diagram -->
  <text x="350" y="34" text-anchor="middle" font-size="15" font-family="monospace" fill="#93a1a1">(+ 2 3)</text>

  <!-- cell labels above the first box of the list -->
  <text x="48" y="68" text-anchor="middle" font-size="12" fill="#93a1a1">first</text>
  <text x="98" y="68" text-anchor="middle" font-size="12" fill="#93a1a1">rest</text>

  <!-- ===== Pair A  first = + , rest -> B ===== -->
  <rect x="23" y="76" width="100" height="52" rx="12" fill="#ffffff" stroke="#073642" stroke-width="2.5"/>
  <line x1="73" y1="76" x2="73" y2="128" stroke="#073642" stroke-width="2"/>
  <text x="48" y="110" text-anchor="middle" font-size="22" font-family="monospace" fill="#073642">+</text>
  <circle cx="98" cy="102" r="5" fill="#268bd2"/>

  <!-- arrow: A rest -> B -->
  <line x1="103" y1="102" x2="216" y2="102" stroke="#268bd2" stroke-width="2.5"/>
  <polygon points="214,96 225,102 214,108" fill="#268bd2"/>

  <!-- ===== Pair B  first = 2 , rest -> C ===== -->
  <rect x="220" y="76" width="100" height="52" rx="12" fill="#ffffff" stroke="#073642" stroke-width="2.5"/>
  <line x1="270" y1="76" x2="270" y2="128" stroke="#073642" stroke-width="2"/>
  <text x="245" y="110" text-anchor="middle" font-size="22" font-family="monospace" fill="#073642">2</text>
  <circle cx="295" cy="102" r="5" fill="#268bd2"/>

  <!-- arrow: B rest -> C -->
  <line x1="300" y1="102" x2="413" y2="102" stroke="#268bd2" stroke-width="2.5"/>
  <polygon points="411,96 422,102 411,108" fill="#268bd2"/>

  <!-- ===== Pair C  first = 3, rest = nil ===== -->
  <rect x="417" y="76" width="100" height="52" rx="12" fill="#ffffff" stroke="#073642" stroke-width="2.5"/>
  <line x1="467" y1="76" x2="467" y2="128" stroke="#073642" stroke-width="2"/>
  <text x="442" y="110" text-anchor="middle" font-size="22" font-family="monospace" fill="#073642">3</text>
  <circle cx="492" cy="102" r="5" fill="#268bd2"/>

  <!-- arrow: C rest -> nil -->
  <line x1="497" y1="102" x2="572" y2="102" stroke="#268bd2" stroke-width="2.5"/>
  <polygon points="570,96 581,102 570,108" fill="#268bd2"/>

  <!-- end-marker: nil for the list -->
  <rect x="583" y="80" width="50" height="44" rx="10" fill="#fdf6e3" stroke="#073642" stroke-width="2"/>
  <text x="608" y="108" text-anchor="middle" font-size="15" font-family="monospace" fill="#657b83">nil</text>

  <!-- caption -->
  <text x="350" y="188" text-anchor="middle" font-size="13" fill="#93a1a1">the operator sits in the first field; each rest field points to</text>
  <text x="350" y="206" text-anchor="middle" font-size="13" fill="#93a1a1">the next Pair, ending at nil.</text>
</svg>

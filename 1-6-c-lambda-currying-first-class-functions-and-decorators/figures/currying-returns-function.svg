<svg xmlns="http://www.w3.org/2000/svg" viewBox="-36 -16 732 332" font-family="-apple-system, 'Segoe UI', Helvetica, sans-serif">
  <!-- ===================== STEP 1 ===================== -->
  <text x="116" y="40" text-anchor="middle" font-size="13" fill="#657b83">Step 1</text>

  <!-- first call expression -->
  <rect x="16" y="60" width="200" height="50" rx="12" fill="#ffffff" stroke="#268bd2" stroke-width="2"/>
  <text x="116" y="91" text-anchor="middle" font-size="20" font-family="monospace" fill="#073642">curried_pow(2)</text>

  <!-- blue arrow: call -> function card -->
  <line x1="218" y1="85" x2="266" y2="85" stroke="#268bd2" stroke-width="2.5"/>
  <polygon points="264,79 275,85 264,91" fill="#268bd2"/>

  <!-- the FUNCTION CARD (a function value, not a number) -->
  <rect x="278" y="44" width="226" height="118" rx="16" fill="#fdf6e3" stroke="#073642" stroke-width="2.5"/>
  <text x="391" y="80" text-anchor="middle" font-size="19" font-family="monospace" font-weight="bold" fill="#073642">a function</text>
  <text x="391" y="108" text-anchor="middle" font-size="13" fill="#657b83">waiting for y, with</text>
  <text x="391" y="134" text-anchor="middle" font-size="16" font-family="monospace" fill="#073642">x = 2</text>
  <text x="391" y="152" text-anchor="middle" font-size="12" fill="#657b83">baked in</text>

  <!-- ===================== STEP 2 ===================== -->
  <text x="566" y="40" text-anchor="middle" font-size="13" fill="#657b83">Step 2</text>

  <!-- connector: feed (3) to the card -->
  <line x1="504" y1="85" x2="528" y2="85" stroke="#268bd2" stroke-width="2.5"/>
  <polygon points="526,79 537,85 526,91" fill="#268bd2"/>

  <!-- second call: apply (3) to the card -->
  <rect x="538" y="60" width="62" height="50" rx="12" fill="#ffffff" stroke="#268bd2" stroke-width="2"/>
  <text x="569" y="91" text-anchor="middle" font-size="20" font-family="monospace" fill="#073642">(3)</text>
  <text x="569" y="130" text-anchor="middle" font-size="11" fill="#93a1a1">call the card</text>

  <!-- cyan arrow: card called with (3) -> result -->
  <line x1="569" y1="186" x2="569" y2="226" stroke="#2aa198" stroke-width="2.5"/>
  <polygon points="563,224 569,235 575,224" fill="#2aa198"/>

  <!-- result box -->
  <rect x="523" y="235" width="92" height="50" rx="12" fill="#ffffff" stroke="#2aa198" stroke-width="2"/>
  <text x="569" y="268" text-anchor="middle" font-size="24" font-family="monospace" fill="#073642">8</text>

  <!-- caption -->
  <text x="300" y="290" text-anchor="middle" font-size="13" fill="#93a1a1">the first call hands back a function; the second call finally produces the number.</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 360" font-family="-apple-system, 'Segoe UI', Helvetica, sans-serif">
  <!-- what we are looking up -->
  <text x="340" y="22" text-anchor="middle" font-size="13" fill="#657b83">looking up</text>
  <text x="340" y="44" text-anchor="middle" font-size="19" font-family="monospace" fill="#073642">checking.deposit</text>

  <!-- TOP: class Account, the base -->
  <rect x="208" y="58" width="264" height="70" rx="14" fill="#fdf6e3" stroke="#073642" stroke-width="2.5"/>
  <text x="340" y="81" text-anchor="middle" font-size="15" font-weight="bold" font-family="monospace" fill="#073642">class Account</text>
  <text x="340" y="98" text-anchor="middle" font-size="11" fill="#93a1a1">the base class</text>
  <line x1="228" y1="106" x2="452" y2="106" stroke="#93a1a1" stroke-width="1"/>
  <text x="340" y="122" text-anchor="middle" font-size="13" font-family="monospace" fill="#073642">defines deposit, withdraw</text>

  <!-- MIDDLE: class CheckingAccount -->
  <rect x="208" y="150" width="264" height="70" rx="14" fill="#ffffff" stroke="#073642" stroke-width="2.5"/>
  <text x="340" y="173" text-anchor="middle" font-size="15" font-weight="bold" font-family="monospace" fill="#073642">class CheckingAccount</text>
  <text x="340" y="190" text-anchor="middle" font-size="11" fill="#93a1a1">the subclass</text>
  <line x1="228" y1="198" x2="452" y2="198" stroke="#93a1a1" stroke-width="1"/>
  <text x="340" y="214" text-anchor="middle" font-size="13" font-family="monospace" fill="#073642">defines withdraw, interest</text>

  <!-- BOTTOM: a CheckingAccount instance -->
  <rect x="208" y="242" width="264" height="70" rx="14" fill="#ffffff" stroke="#073642" stroke-width="2.5"/>
  <text x="340" y="265" text-anchor="middle" font-size="14" font-weight="bold" fill="#073642">a CheckingAccount instance</text>
  <text x="340" y="282" text-anchor="middle" font-size="11" fill="#93a1a1">named checking</text>
  <line x1="228" y1="290" x2="452" y2="290" stroke="#93a1a1" stroke-width="1"/>
  <text x="340" y="306" text-anchor="middle" font-size="13" font-family="monospace" fill="#073642">balance</text>

  <!-- upward arrow: instance -> CheckingAccount -->
  <line x1="340" y1="242" x2="340" y2="222" stroke="#268bd2" stroke-width="2.5"/>
  <polygon points="334,224 340,213 346,224" fill="#268bd2"/>

  <!-- upward arrow: CheckingAccount -> Account -->
  <line x1="340" y1="150" x2="340" y2="130" stroke="#268bd2" stroke-width="2.5"/>
  <polygon points="334,132 340,121 346,132" fill="#268bd2"/>

  <!-- step 1: check the instance (not found) -->
  <circle cx="118" cy="277" r="14" fill="#268bd2"/>
  <text x="118" y="282" text-anchor="middle" font-size="15" font-weight="bold" fill="#ffffff">1</text>
  <line x1="136" y1="277" x2="201" y2="277" stroke="#268bd2" stroke-width="2.5"/>
  <polygon points="199,271 210,277 199,283" fill="#268bd2"/>
  <text x="556" y="272" text-anchor="middle" font-size="12" fill="#657b83">check the instance</text>
  <text x="556" y="289" text-anchor="middle" font-size="12" fill="#dc322f">not found</text>

  <!-- step 2: check CheckingAccount (not found) -->
  <circle cx="118" cy="185" r="14" fill="#268bd2"/>
  <text x="118" y="190" text-anchor="middle" font-size="15" font-weight="bold" fill="#ffffff">2</text>
  <line x1="136" y1="185" x2="201" y2="185" stroke="#268bd2" stroke-width="2.5"/>
  <polygon points="199,179 210,185 199,191" fill="#268bd2"/>
  <text x="556" y="180" text-anchor="middle" font-size="12" fill="#657b83">check CheckingAccount</text>
  <text x="556" y="197" text-anchor="middle" font-size="12" fill="#dc322f">not found</text>

  <!-- step 3: walk UP to Account (found here) -->
  <circle cx="118" cy="93" r="14" fill="#268bd2"/>
  <text x="118" y="98" text-anchor="middle" font-size="15" font-weight="bold" fill="#ffffff">3</text>
  <line x1="136" y1="93" x2="201" y2="93" stroke="#268bd2" stroke-width="2.5"/>
  <polygon points="199,87 210,93 199,99" fill="#268bd2"/>
  <text x="556" y="88" text-anchor="middle" font-size="12" fill="#657b83">walk UP to Account</text>
  <text x="556" y="105" text-anchor="middle" font-size="12" font-weight="bold" fill="#2aa198">found here</text>

  <!-- caption -->
  <text x="340" y="336" text-anchor="middle" font-size="13" fill="#93a1a1">a method is found by walking UP the inheritance chain</text>
  <text x="340" y="353" text-anchor="middle" font-size="13" fill="#93a1a1">until a class defines it.</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="-97 -18 894 648" font-family="-apple-system, 'Segoe UI', Helvetica, sans-serif">
  <!-- ===== title ===== -->
  <text x="350" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#073642">The Lost Update: Interleaved Threads and Frozen Snapshots</text>

  <!-- ===== lane headers ===== -->
  <text x="150" y="58" text-anchor="middle" font-size="14" font-weight="bold" fill="#268bd2">Thread 0</text>
  <text x="350" y="54" text-anchor="middle" font-size="12" fill="#657b83">shared</text>
  <text x="350" y="68" text-anchor="middle" font-size="13" font-weight="bold" font-family="monospace" fill="#073642">counter[0]</text>
  <text x="550" y="58" text-anchor="middle" font-size="14" font-weight="bold" fill="#dc322f">Thread 1</text>

  <!-- time arrow (top to bottom, muted) -->
  <text x="350" y="86" text-anchor="middle" font-size="11" fill="#93a1a1">time &#8595;</text>

  <!-- ===== center live-value column: a small box per time step ===== -->
  <!-- Row 1 cell: 0 -->
  <rect x="318" y="100" width="64" height="40" rx="8" fill="#ffffff" stroke="#073642" stroke-width="2"/>
  <text x="350" y="126" text-anchor="middle" font-size="20" font-family="monospace" fill="#073642">0</text>
  <!-- Row 2 cell: still 0 -->
  <rect x="318" y="190" width="64" height="40" rx="8" fill="#ffffff" stroke="#073642" stroke-width="2"/>
  <text x="350" y="216" text-anchor="middle" font-size="20" font-family="monospace" fill="#073642">0</text>
  <!-- Row 4 cell: changes to 1 (cyan = a real result) -->
  <rect x="318" y="370" width="64" height="40" rx="8" fill="#ffffff" stroke="#2aa198" stroke-width="2.5"/>
  <text x="350" y="396" text-anchor="middle" font-size="20" font-family="monospace" fill="#073642">1</text>
  <!-- Row 6 cell: stays 1 (red = the lost update) -->
  <rect x="318" y="490" width="64" height="40" rx="8" fill="#ffffff" stroke="#dc322f" stroke-width="2.5"/>
  <text x="350" y="516" text-anchor="middle" font-size="20" font-family="monospace" fill="#073642">1</text>

  <!-- ================= ROW 1 (Thread 0): read 0 ================= -->
  <rect x="42" y="100" width="216" height="40" rx="10" fill="#ffffff" stroke="#073642" stroke-width="2"/>
  <text x="150" y="125" text-anchor="middle" font-size="12" font-family="monospace" fill="#073642">read counter[0] &#8594; count = 0</text>
  <!-- read pulls FROM center: thin blue arrow center -> thread0 box -->
  <line x1="316" y1="120" x2="248" y2="120" stroke="#268bd2" stroke-width="2"/>
  <polygon points="252,114 246,120 252,126" fill="#268bd2"/>

  <!-- switch divider 1 -->
  <line x1="14" y1="165" x2="686" y2="165" stroke="#93a1a1" stroke-width="1.5" stroke-dasharray="4 5"/>
  <text x="688" y="161" text-anchor="end" font-size="10" fill="#93a1a1">thread switch</text>

  <!-- ================= ROW 2 (Thread 1): read 0 ================= -->
  <rect x="442" y="190" width="216" height="40" rx="10" fill="#ffffff" stroke="#073642" stroke-width="2"/>
  <text x="550" y="215" text-anchor="middle" font-size="12" font-family="monospace" fill="#073642">read counter[0] &#8594; count = 0</text>
  <!-- read pulls FROM center: thin blue arrow center -> thread1 box -->
  <line x1="384" y1="210" x2="452" y2="210" stroke="#268bd2" stroke-width="2"/>
  <polygon points="448,204 454,210 448,216" fill="#268bd2"/>

  <!-- switch divider 2 -->
  <line x1="14" y1="255" x2="686" y2="255" stroke="#93a1a1" stroke-width="1.5" stroke-dasharray="4 5"/>
  <text x="688" y="251" text-anchor="end" font-size="10" fill="#93a1a1">thread switch</text>

  <!-- ================= ROW 3 (Thread 0): compute ================= -->
  <rect x="56" y="280" width="188" height="40" rx="10" fill="#ffffff" stroke="#073642" stroke-width="2"/>
  <text x="150" y="305" text-anchor="middle" font-size="13" font-family="monospace" fill="#073642">compute count + 1 = 1</text>

  <!-- ================= ROW 4 (Thread 0): write 1 ================= -->
  <rect x="56" y="370" width="188" height="40" rx="10" fill="#ffffff" stroke="#073642" stroke-width="2"/>
  <text x="150" y="395" text-anchor="middle" font-size="13" font-family="monospace" fill="#073642">write 1 &#8594; counter[0]</text>
  <!-- write pushes INTO center: cyan arrow thread0 box -> center cell -->
  <line x1="246" y1="390" x2="314" y2="390" stroke="#2aa198" stroke-width="2.5"/>
  <polygon points="310,384 316,390 310,396" fill="#2aa198"/>

  <!-- switch divider 3 -->
  <line x1="14" y1="435" x2="686" y2="435" stroke="#93a1a1" stroke-width="1.5" stroke-dasharray="4 5"/>
  <text x="688" y="431" text-anchor="end" font-size="10" fill="#93a1a1">thread switch</text>

  <!-- ================= ROW 5 (Thread 1): compute ================= -->
  <rect x="456" y="450" width="188" height="40" rx="10" fill="#ffffff" stroke="#073642" stroke-width="2"/>
  <text x="550" y="475" text-anchor="middle" font-size="13" font-family="monospace" fill="#073642">compute count + 1 = 1</text>

  <!-- ================= ROW 6 (Thread 1): write 1  (THE CRUCIAL STEP) ================= -->
  <rect x="454" y="488" width="192" height="44" rx="10" fill="#ffffff" stroke="#dc322f" stroke-width="2.5"/>
  <text x="550" y="514" text-anchor="middle" font-size="13" font-family="monospace" fill="#073642">write 1 &#8594; counter[0]</text>
  <!-- crucial step tag -->
  <text x="550" y="548" text-anchor="middle" font-size="11" font-weight="bold" fill="#dc322f">the crucial step</text>
  <!-- write pushes INTO center: red arrow thread1 box -> center cell -->
  <line x1="452" y1="510" x2="386" y2="510" stroke="#dc322f" stroke-width="2.5"/>
  <polygon points="390,504 384,510 390,516" fill="#dc322f"/>
  <!-- overwrite note next to the center cell -->
  <text x="350" y="552" text-anchor="middle" font-size="11" fill="#dc322f">overwrites,</text>
  <text x="350" y="566" text-anchor="middle" font-size="11" fill="#dc322f">does not stack</text>

  <!-- ================= FAR-LEFT rail: Thread 0 private count, frozen at 0 (rows 1-4) ================= -->
  <rect x="14" y="100" width="30" height="310" rx="8" fill="#fdf6e3" stroke="#268bd2" stroke-width="2" stroke-dasharray="5 4"/>
  <!-- pinned value 0 -->
  <text x="29" y="250" text-anchor="middle" font-size="18" font-family="monospace" fill="#073642">0</text>
  <!-- frozen / snowflake icon -->
  <text x="29" y="130" text-anchor="middle" font-size="15" fill="#268bd2">&#10052;</text>
  <!-- vertical rail label -->
  <text x="29" y="290" text-anchor="middle" font-size="10" fill="#657b83" transform="rotate(90 29 290)">Thread 0 private count (frozen at 0)</text>

  <!-- ================= FAR-RIGHT rail: Thread 1 private count, frozen at 0 (rows 2-6) ================= -->
  <rect x="666" y="190" width="30" height="342" rx="8" fill="#fdf6e3" stroke="#dc322f" stroke-width="2" stroke-dasharray="5 4"/>
  <!-- pinned value 0 -->
  <text x="681" y="365" text-anchor="middle" font-size="18" font-family="monospace" fill="#073642">0</text>
  <!-- frozen / snowflake icon -->
  <text x="681" y="220" text-anchor="middle" font-size="15" fill="#dc322f">&#10052;</text>
  <!-- vertical rail label -->
  <text x="681" y="405" text-anchor="middle" font-size="10" fill="#657b83" transform="rotate(90 681 405)">Thread 1 private count (frozen at 0)</text>

  <!-- frozen note (shared meaning of both rails) -->
  <text x="350" y="586" text-anchor="middle" font-size="11" fill="#93a1a1">each private count never updated by the other thread's write</text>

  <!-- ===== bottom callout box spanning the width ===== -->
  <rect x="14" y="596" width="672" height="2" fill="none" stroke="none"/>
  <text x="350" y="608" text-anchor="middle" font-size="13" fill="#657b83">Two correct local computations (0+1) &#8594; one wrong global result: counter ends at 1, not 2.</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="-18 -18 783 678" font-family="-apple-system, 'Segoe UI', Helvetica, sans-serif">
  <!-- ===== TOP bracket: FRAMEWORK spans all four columns ===== -->
  <line x1="24" y1="40" x2="24" y2="30" stroke="#657b83" stroke-width="1.5"/>
  <line x1="24" y1="30" x2="696" y2="30" stroke="#657b83" stroke-width="1.5"/>
  <line x1="696" y1="30" x2="696" y2="40" stroke="#657b83" stroke-width="1.5"/>
  <text x="360" y="22" text-anchor="middle" font-size="13" fill="#657b83">FRAMEWORK handles routing, sorting, failures</text>

  <!-- ===== stage headers ===== -->
  <text x="92" y="62" text-anchor="middle" font-size="15" font-weight="bold" fill="#073642">INPUT</text>
  <text x="92" y="80" text-anchor="middle" font-size="12" fill="#657b83">lines of text</text>

  <text x="280" y="62" text-anchor="middle" font-size="15" font-weight="bold" fill="#073642">MAP</text>
  <text x="280" y="80" text-anchor="middle" font-size="12" fill="#657b83">count_vowels per line</text>

  <text x="470" y="62" text-anchor="middle" font-size="15" font-weight="bold" fill="#073642">GROUP / SORT</text>
  <text x="470" y="80" text-anchor="middle" font-size="12" fill="#657b83">collect slips by key</text>

  <text x="635" y="62" text-anchor="middle" font-size="15" font-weight="bold" fill="#073642">REDUCE</text>
  <text x="635" y="80" text-anchor="middle" font-size="12" fill="#657b83">sum adds each bin</text>

  <!-- ============================================================ -->
  <!-- COLUMN 1: INPUT  three lines of text                         -->
  <!-- ============================================================ -->
  <!-- input A: 'the sea' -->
  <rect x="48" y="142" width="88" height="40" rx="10" fill="#ffffff" stroke="#268bd2" stroke-width="2"/>
  <text x="92" y="167" text-anchor="middle" font-size="16" font-family="monospace" fill="#073642">the sea</text>
  <!-- input B: 'a bee' -->
  <rect x="48" y="296" width="88" height="40" rx="10" fill="#ffffff" stroke="#268bd2" stroke-width="2"/>
  <text x="92" y="321" text-anchor="middle" font-size="16" font-family="monospace" fill="#073642">a bee</text>
  <!-- input C: 'i obey' -->
  <rect x="48" y="450" width="88" height="40" rx="10" fill="#ffffff" stroke="#268bd2" stroke-width="2"/>
  <text x="92" y="475" text-anchor="middle" font-size="16" font-family="monospace" fill="#073642">i obey</text>

  <!-- INPUT -> MAP arrows (blue) -->
  <line x1="138" y1="162" x2="206" y2="162" stroke="#268bd2" stroke-width="2.5"/>
  <polygon points="204,156 215,162 204,168" fill="#268bd2"/>
  <line x1="138" y1="316" x2="206" y2="316" stroke="#268bd2" stroke-width="2.5"/>
  <polygon points="204,310 215,316 204,322" fill="#268bd2"/>
  <line x1="138" y1="470" x2="206" y2="470" stroke="#268bd2" stroke-width="2.5"/>
  <polygon points="204,464 215,470 204,476" fill="#268bd2"/>

  <!-- ============================================================ -->
  <!-- COLUMN 2: MAP  one map task per line, runs in parallel       -->
  <!-- ============================================================ -->
  <!-- parallel band label -->
  <text x="280" y="106" text-anchor="middle" font-size="12" font-style="italic" fill="#93a1a1">map phase &#8212; runs in parallel</text>

  <!-- map task 1 -->
  <rect x="218" y="124" width="124" height="76" rx="12" fill="#fdf6e3" stroke="#073642" stroke-width="2"/>
  <text x="280" y="150" text-anchor="middle" font-size="13" font-weight="bold" font-family="monospace" fill="#073642">map task</text>
  <text x="280" y="170" text-anchor="middle" font-size="11" fill="#657b83">counts vowels in</text>
  <text x="280" y="187" text-anchor="middle" font-size="12" font-family="monospace" fill="#073642">'the sea'</text>
  <!-- map task 2 -->
  <rect x="218" y="278" width="124" height="76" rx="12" fill="#fdf6e3" stroke="#073642" stroke-width="2"/>
  <text x="280" y="304" text-anchor="middle" font-size="13" font-weight="bold" font-family="monospace" fill="#073642">map task</text>
  <text x="280" y="324" text-anchor="middle" font-size="11" fill="#657b83">counts vowels in</text>
  <text x="280" y="341" text-anchor="middle" font-size="12" font-family="monospace" fill="#073642">'a bee'</text>
  <!-- map task 3 -->
  <rect x="218" y="432" width="124" height="76" rx="12" fill="#fdf6e3" stroke="#073642" stroke-width="2"/>
  <text x="280" y="458" text-anchor="middle" font-size="13" font-weight="bold" font-family="monospace" fill="#073642">map task</text>
  <text x="280" y="478" text-anchor="middle" font-size="11" fill="#657b83">counts vowels in</text>
  <text x="280" y="495" text-anchor="middle" font-size="12" font-family="monospace" fill="#073642">'i obey'</text>

  <!-- ===== emitted slips (key bold on top, value below); cream tags ===== -->
  <!-- task 1 slips: [e:2] [a:1] -->
  <rect x="352" y="120" width="44" height="38" rx="8" fill="#fdf6e3" stroke="#268bd2" stroke-width="2"/>
  <text x="374" y="136" text-anchor="middle" font-size="12" font-weight="bold" font-family="monospace" fill="#073642">e</text>
  <text x="374" y="151" text-anchor="middle" font-size="12" font-family="monospace" fill="#657b83">2</text>
  <rect x="352" y="166" width="44" height="38" rx="8" fill="#fdf6e3" stroke="#268bd2" stroke-width="2"/>
  <text x="374" y="182" text-anchor="middle" font-size="12" font-weight="bold" font-family="monospace" fill="#073642">a</text>
  <text x="374" y="197" text-anchor="middle" font-size="12" font-family="monospace" fill="#657b83">1</text>
  <!-- task 2 slips: [a:1] [e:2] -->
  <rect x="352" y="274" width="44" height="38" rx="8" fill="#fdf6e3" stroke="#268bd2" stroke-width="2"/>
  <text x="374" y="290" text-anchor="middle" font-size="12" font-weight="bold" font-family="monospace" fill="#073642">a</text>
  <text x="374" y="305" text-anchor="middle" font-size="12" font-family="monospace" fill="#657b83">1</text>
  <rect x="352" y="320" width="44" height="38" rx="8" fill="#fdf6e3" stroke="#268bd2" stroke-width="2"/>
  <text x="374" y="336" text-anchor="middle" font-size="12" font-weight="bold" font-family="monospace" fill="#073642">e</text>
  <text x="374" y="351" text-anchor="middle" font-size="12" font-family="monospace" fill="#657b83">2</text>
  <!-- task 3 slips: [i:1] [o:1] [e:1] -->
  <rect x="352" y="418" width="44" height="38" rx="8" fill="#fdf6e3" stroke="#268bd2" stroke-width="2"/>
  <text x="374" y="434" text-anchor="middle" font-size="12" font-weight="bold" font-family="monospace" fill="#073642">i</text>
  <text x="374" y="449" text-anchor="middle" font-size="12" font-family="monospace" fill="#657b83">1</text>
  <rect x="352" y="464" width="44" height="38" rx="8" fill="#fdf6e3" stroke="#268bd2" stroke-width="2"/>
  <text x="374" y="480" text-anchor="middle" font-size="12" font-weight="bold" font-family="monospace" fill="#073642">o</text>
  <text x="374" y="495" text-anchor="middle" font-size="12" font-family="monospace" fill="#657b83">1</text>
  <rect x="352" y="510" width="44" height="38" rx="8" fill="#fdf6e3" stroke="#268bd2" stroke-width="2"/>
  <text x="374" y="526" text-anchor="middle" font-size="12" font-weight="bold" font-family="monospace" fill="#073642">e</text>
  <text x="374" y="541" text-anchor="middle" font-size="12" font-family="monospace" fill="#657b83">1</text>

  <!-- caption under map band -->
  <text x="280" y="576" text-anchor="middle" font-size="12" fill="#93a1a1">zero counts emit nothing (no [u:0] slip)</text>

  <!-- ===== GROUP/SORT routing arrows: each slip -> its bin ===== -->
  <!-- bins are at x 408..560; bin centers y: a=150, e=270, i=378, o=486 -->
  <!-- e:2 (task1, y137) -> e bin (270) -->
  <line x1="396" y1="139" x2="486" y2="262" stroke="#93a1a1" stroke-width="1.5"/>
  <polygon points="481,255 489,265 477,266" fill="#93a1a1"/>
  <!-- a:1 (task1, y185) -> a bin (150) -->
  <line x1="396" y1="185" x2="486" y2="158" stroke="#93a1a1" stroke-width="1.5"/>
  <polygon points="479,154 489,156 481,164" fill="#93a1a1"/>
  <!-- a:1 (task2, y293) -> a bin (150) -->
  <line x1="396" y1="293" x2="486" y2="166" stroke="#93a1a1" stroke-width="1.5"/>
  <polygon points="481,162 489,167 480,174" fill="#93a1a1"/>
  <!-- e:2 (task2, y339) -> e bin (270) -->
  <line x1="396" y1="339" x2="486" y2="278" stroke="#93a1a1" stroke-width="1.5"/>
  <polygon points="479,272 489,276 481,283" fill="#93a1a1"/>
  <!-- i:1 (task3, y437) -> i bin (378) -->
  <line x1="396" y1="437" x2="486" y2="386" stroke="#93a1a1" stroke-width="1.5"/>
  <polygon points="479,381 489,385 481,392" fill="#93a1a1"/>
  <!-- o:1 (task3, y483) -> o bin (486) -->
  <line x1="396" y1="483" x2="486" y2="490" stroke="#93a1a1" stroke-width="1.5"/>
  <polygon points="479,484 489,489 479,496" fill="#93a1a1"/>
  <!-- e:1 (task3, y529) -> e bin (270) -->
  <line x1="396" y1="529" x2="486" y2="286" stroke="#93a1a1" stroke-width="1.5"/>
  <polygon points="481,283 489,289 480,295" fill="#93a1a1"/>

  <!-- ============================================================ -->
  <!-- COLUMN 3: GROUP / SORT  four bins                            -->
  <!-- ============================================================ -->
  <!-- bin a -->
  <rect x="412" y="124" width="116" height="52" rx="10" fill="#ffffff" stroke="#073642" stroke-width="2"/>
  <text x="424" y="155" text-anchor="middle" font-size="14" font-weight="bold" font-family="monospace" fill="#073642">a</text>
  <text x="478" y="155" text-anchor="middle" font-size="14" font-family="monospace" fill="#657b83">1  1</text>
  <!-- bin e -->
  <rect x="412" y="244" width="116" height="52" rx="10" fill="#ffffff" stroke="#073642" stroke-width="2"/>
  <text x="424" y="275" text-anchor="middle" font-size="14" font-weight="bold" font-family="monospace" fill="#073642">e</text>
  <text x="482" y="275" text-anchor="middle" font-size="14" font-family="monospace" fill="#657b83">2  2  1</text>
  <!-- bin i -->
  <rect x="412" y="352" width="116" height="52" rx="10" fill="#ffffff" stroke="#073642" stroke-width="2"/>
  <text x="424" y="383" text-anchor="middle" font-size="14" font-weight="bold" font-family="monospace" fill="#073642">i</text>
  <text x="478" y="383" text-anchor="middle" font-size="14" font-family="monospace" fill="#657b83">1</text>
  <!-- bin o -->
  <rect x="412" y="460" width="116" height="52" rx="10" fill="#ffffff" stroke="#073642" stroke-width="2"/>
  <text x="424" y="491" text-anchor="middle" font-size="14" font-weight="bold" font-family="monospace" fill="#073642">o</text>
  <text x="478" y="491" text-anchor="middle" font-size="14" font-family="monospace" fill="#657b83">1</text>

  <!-- caption under group band -->
  <text x="470" y="576" text-anchor="middle" font-size="12" fill="#93a1a1">groups only &#8212; does NOT add</text>

  <!-- GROUP -> REDUCE arrows (one per bin) -->
  <line x1="528" y1="150" x2="576" y2="150" stroke="#073642" stroke-width="2"/>
  <polygon points="574,144 585,150 574,156" fill="#073642"/>
  <line x1="528" y1="270" x2="576" y2="270" stroke="#073642" stroke-width="2"/>
  <polygon points="574,264 585,270 574,276" fill="#073642"/>
  <line x1="528" y1="378" x2="576" y2="378" stroke="#073642" stroke-width="2"/>
  <polygon points="574,372 585,378 574,384" fill="#073642"/>
  <line x1="528" y1="486" x2="576" y2="486" stroke="#073642" stroke-width="2"/>
  <polygon points="574,480 585,486 574,492" fill="#073642"/>

  <!-- ============================================================ -->
  <!-- COLUMN 4: REDUCE  one reduce task per bin, runs in parallel  -->
  <!-- ============================================================ -->
  <!-- parallel band label -->
  <text x="635" y="106" text-anchor="middle" font-size="12" font-style="italic" fill="#93a1a1">reduce phase &#8212; runs in parallel</text>

  <!-- reduce task a -->
  <rect x="588" y="124" width="116" height="52" rx="12" fill="#fdf6e3" stroke="#073642" stroke-width="2"/>
  <text x="646" y="146" text-anchor="middle" font-size="12" font-weight="bold" font-family="monospace" fill="#073642">reduce task</text>
  <text x="646" y="164" text-anchor="middle" font-size="12" font-family="monospace" fill="#657b83">sum(1, 1)</text>
  <!-- reduce task e -->
  <rect x="588" y="244" width="116" height="52" rx="12" fill="#fdf6e3" stroke="#073642" stroke-width="2"/>
  <text x="646" y="266" text-anchor="middle" font-size="12" font-weight="bold" font-family="monospace" fill="#073642">reduce task</text>
  <text x="646" y="284" text-anchor="middle" font-size="12" font-family="monospace" fill="#657b83">sum(2, 2, 1)</text>
  <!-- reduce task i -->
  <rect x="588" y="352" width="116" height="52" rx="12" fill="#fdf6e3" stroke="#073642" stroke-width="2"/>
  <text x="646" y="374" text-anchor="middle" font-size="12" font-weight="bold" font-family="monospace" fill="#073642">reduce task</text>
  <text x="646" y="392" text-anchor="middle" font-size="12" font-family="monospace" fill="#657b83">sum(1)</text>
  <!-- reduce task o -->
  <rect x="588" y="460" width="116" height="52" rx="12" fill="#fdf6e3" stroke="#073642" stroke-width="2"/>
  <text x="646" y="482" text-anchor="middle" font-size="12" font-weight="bold" font-family="monospace" fill="#073642">reduce task</text>
  <text x="646" y="500" text-anchor="middle" font-size="12" font-family="monospace" fill="#657b83">sum(1)</text>

  <!-- final emitted pairs (cyan = results) -->
  <line x1="646" y1="176" x2="646" y2="198" stroke="#2aa198" stroke-width="2.5"/>
  <polygon points="640,196 646,207 652,196" fill="#2aa198"/>
  <rect x="610" y="207" width="72" height="34" rx="8" fill="#ffffff" stroke="#2aa198" stroke-width="2"/>
  <text x="646" y="230" text-anchor="middle" font-size="14" font-family="monospace" fill="#073642">a &#8594; 2</text>

  <line x1="646" y1="296" x2="646" y2="318" stroke="#2aa198" stroke-width="2.5"/>
  <polygon points="640,316 646,327 652,316" fill="#2aa198"/>
  <rect x="610" y="327" width="72" height="34" rx="8" fill="#ffffff" stroke="#2aa198" stroke-width="2"/>
  <text x="646" y="350" text-anchor="middle" font-size="14" font-family="monospace" fill="#073642">e &#8594; 5</text>

  <line x1="646" y1="404" x2="646" y2="426" stroke="#2aa198" stroke-width="2.5"/>
  <polygon points="640,424 646,435 652,424" fill="#2aa198"/>
  <rect x="610" y="435" width="72" height="34" rx="8" fill="#ffffff" stroke="#2aa198" stroke-width="2"/>
  <text x="646" y="458" text-anchor="middle" font-size="14" font-family="monospace" fill="#073642">i &#8594; 1</text>

  <line x1="646" y1="512" x2="646" y2="534" stroke="#2aa198" stroke-width="2.5"/>
  <polygon points="640,532 646,543 652,532" fill="#2aa198"/>
  <rect x="610" y="543" width="72" height="34" rx="8" fill="#ffffff" stroke="#2aa198" stroke-width="2"/>
  <text x="646" y="566" text-anchor="middle" font-size="14" font-family="monospace" fill="#073642">o &#8594; 1</text>

  <!-- ===== BOTTOM bracket: YOU write Map + Reduce only ===== -->
  <line x1="218" y1="596" x2="218" y2="606" stroke="#268bd2" stroke-width="1.5"/>
  <line x1="218" y1="606" x2="704" y2="606" stroke="#268bd2" stroke-width="1.5"/>
  <line x1="704" y1="606" x2="704" y2="596" stroke="#268bd2" stroke-width="1.5"/>
  <text x="461" y="628" text-anchor="middle" font-size="13" font-weight="bold" fill="#268bd2">YOU write only these two functions</text>
</svg>

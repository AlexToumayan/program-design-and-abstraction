<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 340" font-family="-apple-system, 'Segoe UI', Helvetica, sans-serif">
  <!-- ================= EDGES (drawn first, behind nodes) ================= -->
  <!-- Non-highlighted edges in blue -->
  <!-- root fib(5) -> fib(3) (right child) -->
  <line x1="320" y1="64" x2="430" y2="116" stroke="#268bd2" stroke-width="2"/>
  <!-- fib(4) -> fib(2) (right child) -->
  <line x1="250" y1="140" x2="320" y2="192" stroke="#268bd2" stroke-width="2"/>
  <!-- fib(3,right) -> fib(2), fib(1) -->
  <line x1="430" y1="140" x2="380" y2="192" stroke="#268bd2" stroke-width="2"/>
  <line x1="430" y1="140" x2="490" y2="192" stroke="#268bd2" stroke-width="2"/>
  <!-- fib(3,left) -> fib(2) (right child) -->
  <line x1="200" y1="216" x2="240" y2="268" stroke="#268bd2" stroke-width="2"/>

  <!-- Highlighted deepest path edges in cyan (thicker) -->
  <!-- fib(5) -> fib(4) -->
  <line x1="320" y1="64" x2="250" y2="116" stroke="#2aa198" stroke-width="3.5"/>
  <!-- fib(4) -> fib(3,left) -->
  <line x1="250" y1="140" x2="200" y2="192" stroke="#2aa198" stroke-width="3.5"/>
  <!-- fib(3,left) -> fib(1) leaf -->
  <line x1="200" y1="216" x2="160" y2="268" stroke="#2aa198" stroke-width="3.5"/>

  <!-- ================= NODES ================= -->
  <!-- Root -->
  <rect x="289" y="28" width="62" height="36" rx="11" fill="#fdf6e3" stroke="#073642" stroke-width="2.5"/>
  <text x="320" y="51" text-anchor="middle" font-size="15" font-family="monospace" fill="#073642">fib(5)</text>

  <!-- Level 2: fib(4) is on the highlighted path (cyan), fib(3) is normal -->
  <rect x="219" y="116" width="62" height="36" rx="11" fill="#ffffff" stroke="#2aa198" stroke-width="3"/>
  <text x="250" y="139" text-anchor="middle" font-size="15" font-family="monospace" fill="#073642">fib(4)</text>
  <rect x="399" y="116" width="62" height="36" rx="11" fill="#ffffff" stroke="#268bd2" stroke-width="2"/>
  <text x="430" y="139" text-anchor="middle" font-size="15" font-family="monospace" fill="#073642">fib(3)</text>

  <!-- Level 3: fib(3,left) is on the highlighted path (cyan); others normal -->
  <rect x="169" y="192" width="62" height="36" rx="11" fill="#ffffff" stroke="#2aa198" stroke-width="3"/>
  <text x="200" y="215" text-anchor="middle" font-size="15" font-family="monospace" fill="#073642">fib(3)</text>
  <rect x="289" y="192" width="62" height="36" rx="11" fill="#ffffff" stroke="#268bd2" stroke-width="2"/>
  <text x="320" y="215" text-anchor="middle" font-size="15" font-family="monospace" fill="#073642">fib(2)</text>
  <rect x="349" y="192" width="62" height="36" rx="11" fill="#ffffff" stroke="#268bd2" stroke-width="2"/>
  <text x="380" y="215" text-anchor="middle" font-size="15" font-family="monospace" fill="#073642">fib(2)</text>
  <rect x="459" y="192" width="62" height="36" rx="11" fill="#ffffff" stroke="#268bd2" stroke-width="2"/>
  <text x="490" y="215" text-anchor="middle" font-size="15" font-family="monospace" fill="#073642">fib(1)</text>

  <!-- Level 4 leaves under fib(3,left): fib(1) is the deepest highlighted leaf -->
  <rect x="129" y="268" width="62" height="36" rx="11" fill="#ffffff" stroke="#2aa198" stroke-width="3"/>
  <text x="160" y="291" text-anchor="middle" font-size="15" font-family="monospace" fill="#073642">fib(1)</text>
  <rect x="209" y="268" width="62" height="36" rx="11" fill="#ffffff" stroke="#268bd2" stroke-width="2"/>
  <text x="240" y="291" text-anchor="middle" font-size="15" font-family="monospace" fill="#073642">fib(2)</text>

  <!-- ================= LEFT: TIME brace + label (blue) ================= -->
  <!-- vertical brace spanning the whole tree height -->
  <path d="M 60 34 q -8 0 -8 8 L 52 158 q 0 8 -8 8 q 8 0 8 8 L 52 290 q 0 8 8 8"
        fill="none" stroke="#268bd2" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="32" y="160" text-anchor="middle" font-size="13" font-weight="bold" fill="#268bd2" transform="rotate(-90 32 160)">TIME</text>
  <text x="64" y="120" font-size="12" fill="#268bd2">count every</text>
  <text x="64" y="138" font-size="12" fill="#268bd2">node (every</text>
  <text x="64" y="156" font-size="12" fill="#268bd2">call)</text>

  <!-- ================= RIGHT: SPACE label (cyan) pointing to deepest path ================= -->
  <text x="556" y="120" font-size="13" font-weight="bold" fill="#2aa198">SPACE</text>
  <text x="556" y="140" font-size="12" fill="#2aa198">the longest</text>
  <text x="556" y="158" font-size="12" fill="#2aa198">path alive at</text>
  <text x="556" y="176" font-size="12" fill="#2aa198">once (max</text>
  <text x="556" y="194" font-size="12" fill="#2aa198">depth)</text>
  <!-- arrow from the SPACE label to the highlighted deepest fib(1) leaf, approaching from below-right (clears the fib(2) leaf) -->
  <path d="M 556 218 Q 372 322 198 306" fill="none" stroke="#2aa198" stroke-width="2.5"/>
  <polygon points="189,300 201,305 191,314" fill="#2aa198"/>

  <!-- ================= CAPTION ================= -->
  <text x="340" y="324" text-anchor="middle" font-size="12" fill="#93a1a1">the same tree, two readings: time counts all the nodes;</text>
  <text x="340" y="338" text-anchor="middle" font-size="12" fill="#93a1a1">space is only the deepest path active at one moment.</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420" font-family="-apple-system, 'Segoe UI', Helvetica, sans-serif">
  <!-- edges: plain lines from each parent's bottom-center to each child's top-center -->
  <!-- root + to left * and right + -->
  <line x1="348" y1="61" x2="224" y2="109" stroke="#268bd2" stroke-width="2"/>
  <line x1="348" y1="61" x2="556" y2="109" stroke="#268bd2" stroke-width="2"/>
  <!-- left * to leaf 3 and inner + -->
  <line x1="224" y1="143" x2="154" y2="206" stroke="#268bd2" stroke-width="2"/>
  <line x1="224" y1="143" x2="300" y2="195" stroke="#268bd2" stroke-width="2"/>
  <!-- inner + to (* 2 4) node and (+ 3 5) node -->
  <line x1="300" y1="229" x2="236" y2="283" stroke="#268bd2" stroke-width="2"/>
  <line x1="300" y1="229" x2="372" y2="283" stroke="#268bd2" stroke-width="2"/>
  <!-- right + to (- 10 7) node and leaf 6 -->
  <line x1="556" y1="143" x2="512" y2="195" stroke="#268bd2" stroke-width="2"/>
  <line x1="556" y1="143" x2="616" y2="206" stroke="#268bd2" stroke-width="2"/>
  <!-- * (=8) to leaves 2 and 4 -->
  <line x1="236" y1="317" x2="202" y2="360" stroke="#268bd2" stroke-width="2"/>
  <line x1="236" y1="317" x2="272" y2="360" stroke="#268bd2" stroke-width="2"/>
  <!-- + (=8) to leaves 3 and 5 -->
  <line x1="372" y1="317" x2="340" y2="360" stroke="#268bd2" stroke-width="2"/>
  <line x1="372" y1="317" x2="406" y2="360" stroke="#268bd2" stroke-width="2"/>
  <!-- - (=3) to leaves 10 and 7 -->
  <line x1="512" y1="229" x2="474" y2="284" stroke="#268bd2" stroke-width="2"/>
  <line x1="512" y1="229" x2="544" y2="284" stroke="#268bd2" stroke-width="2"/>

  <!-- root node + (=57) -->
  <rect x="327" y="27" width="42" height="34" rx="12" fill="#fdf6e3" stroke="#073642" stroke-width="2.5"/>
  <text x="348" y="50" text-anchor="middle" font-size="20" font-family="monospace" fill="#073642">+</text>
  <rect x="378" y="31" width="58" height="26" rx="13" fill="#2aa198"/>
  <text x="407" y="49" text-anchor="middle" font-size="14" font-family="monospace" fill="#ffffff">= 57</text>

  <!-- left child * (=48) -->
  <rect x="203" y="109" width="42" height="34" rx="12" fill="#ffffff" stroke="#268bd2" stroke-width="2"/>
  <text x="224" y="132" text-anchor="middle" font-size="20" font-family="monospace" fill="#073642">*</text>
  <rect x="254" y="113" width="58" height="26" rx="13" fill="#2aa198"/>
  <text x="283" y="131" text-anchor="middle" font-size="14" font-family="monospace" fill="#ffffff">= 48</text>

  <!-- right child + (=9) -->
  <rect x="535" y="109" width="42" height="34" rx="12" fill="#ffffff" stroke="#268bd2" stroke-width="2"/>
  <text x="556" y="132" text-anchor="middle" font-size="20" font-family="monospace" fill="#073642">+</text>
  <rect x="586" y="113" width="50" height="26" rx="13" fill="#2aa198"/>
  <text x="611" y="131" text-anchor="middle" font-size="14" font-family="monospace" fill="#ffffff">= 9</text>

  <!-- leaf 3 (left child of left *) -->
  <text x="150" y="218" text-anchor="middle" font-size="20" font-family="monospace" fill="#073642">3</text>

  <!-- inner + (=16) -->
  <rect x="279" y="195" width="42" height="34" rx="12" fill="#ffffff" stroke="#268bd2" stroke-width="2"/>
  <text x="300" y="218" text-anchor="middle" font-size="20" font-family="monospace" fill="#073642">+</text>
  <rect x="330" y="199" width="58" height="26" rx="13" fill="#2aa198"/>
  <text x="359" y="217" text-anchor="middle" font-size="14" font-family="monospace" fill="#ffffff">= 16</text>

  <!-- right's left child - (=3) -->
  <rect x="491" y="195" width="42" height="34" rx="12" fill="#ffffff" stroke="#268bd2" stroke-width="2"/>
  <text x="512" y="218" text-anchor="middle" font-size="20" font-family="monospace" fill="#073642">-</text>
  <rect x="542" y="199" width="50" height="26" rx="13" fill="#2aa198"/>
  <text x="567" y="217" text-anchor="middle" font-size="14" font-family="monospace" fill="#ffffff">= 3</text>

  <!-- leaf 6 (right child of right +) -->
  <text x="616" y="218" text-anchor="middle" font-size="20" font-family="monospace" fill="#073642">6</text>

  <!-- * (=8) under inner + -->
  <rect x="215" y="283" width="42" height="34" rx="12" fill="#ffffff" stroke="#268bd2" stroke-width="2"/>
  <text x="236" y="306" text-anchor="middle" font-size="20" font-family="monospace" fill="#073642">*</text>
  <rect x="171" y="287" width="46" height="26" rx="13" fill="#2aa198"/>
  <text x="194" y="305" text-anchor="middle" font-size="14" font-family="monospace" fill="#ffffff">= 8</text>

  <!-- + (=8) under inner + -->
  <rect x="351" y="283" width="42" height="34" rx="12" fill="#ffffff" stroke="#268bd2" stroke-width="2"/>
  <text x="372" y="306" text-anchor="middle" font-size="20" font-family="monospace" fill="#073642">+</text>
  <rect x="400" y="287" width="46" height="26" rx="13" fill="#2aa198"/>
  <text x="423" y="305" text-anchor="middle" font-size="14" font-family="monospace" fill="#ffffff">= 8</text>

  <!-- leaves of * (=8) -->
  <text x="198" y="372" text-anchor="middle" font-size="20" font-family="monospace" fill="#073642">2</text>
  <text x="276" y="372" text-anchor="middle" font-size="20" font-family="monospace" fill="#073642">4</text>
  <!-- leaves of + (=8) -->
  <text x="336" y="372" text-anchor="middle" font-size="20" font-family="monospace" fill="#073642">3</text>
  <text x="410" y="372" text-anchor="middle" font-size="20" font-family="monospace" fill="#073642">5</text>
  <!-- leaves of - (=3) -->
  <text x="470" y="298" text-anchor="middle" font-size="20" font-family="monospace" fill="#073642">10</text>
  <text x="544" y="298" text-anchor="middle" font-size="20" font-family="monospace" fill="#073642">7</text>

  <!-- curved upward arrow: value 16 flows up to the * (=48) above -->
  <path d="M 286 192 C 268 172, 252 158, 246 144" fill="none" stroke="#2aa198" stroke-width="2.5"/>
  <polygon points="240,149 245,137 252,147" fill="#2aa198"/>
  <text x="332" y="166" text-anchor="middle" font-size="11" fill="#93a1a1">the value flows up</text>
  <text x="332" y="180" text-anchor="middle" font-size="11" fill="#93a1a1">to the operator above</text>

  <!-- caption -->
  <text x="350" y="402" text-anchor="middle" font-size="13" fill="#93a1a1">evaluate the innermost subtrees first; replace each with its value;</text>
  <text x="350" y="417" text-anchor="middle" font-size="13" fill="#93a1a1">the root is evaluated last.</text>
</svg>

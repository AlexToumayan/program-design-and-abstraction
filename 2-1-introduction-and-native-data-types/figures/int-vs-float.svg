<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 348" font-family="-apple-system, 'Segoe UI', Helvetica, sans-serif">
  <!-- ============ TOP: int — exact counting ============ -->
  <text x="100" y="48" font-size="15" font-weight="bold" fill="#073642">int</text>
  <text x="138" y="48" font-size="14" fill="#657b83">exact counting</text>

  <!-- top number line (ticks 4..8 at x = 100,220,340,460,580) -->
  <line x1="100" y1="92" x2="580" y2="92" stroke="#073642" stroke-width="2.5"/>
  <line x1="100" y1="83" x2="100" y2="101" stroke="#073642" stroke-width="2"/>
  <line x1="220" y1="83" x2="220" y2="101" stroke="#073642" stroke-width="2"/>
  <line x1="340" y1="83" x2="340" y2="101" stroke="#073642" stroke-width="2"/>
  <line x1="460" y1="83" x2="460" y2="101" stroke="#073642" stroke-width="2"/>
  <line x1="580" y1="83" x2="580" y2="101" stroke="#073642" stroke-width="2"/>

  <!-- top tick labels -->
  <text x="100" y="124" text-anchor="middle" font-size="18" font-family="monospace" fill="#073642">4</text>
  <text x="220" y="124" text-anchor="middle" font-size="18" font-family="monospace" fill="#073642">5</text>
  <text x="340" y="124" text-anchor="middle" font-size="18" font-family="monospace" fill="#073642">6</text>
  <text x="460" y="124" text-anchor="middle" font-size="18" font-family="monospace" fill="#073642">7</text>
  <text x="580" y="124" text-anchor="middle" font-size="18" font-family="monospace" fill="#073642">8</text>

  <!-- solid blue dot exactly on tick 7 -->
  <circle cx="460" cy="92" r="9" fill="#268bd2"/>
  <text x="460" y="68" text-anchor="middle" font-size="12" fill="#93a1a1">lands exactly on the value</text>

  <!-- ============ BOTTOM: float — a mark on a ruler ============ -->
  <text x="100" y="206" font-size="15" font-weight="bold" fill="#073642">float</text>
  <text x="146" y="206" font-size="14" fill="#657b83">a mark on a ruler</text>

  <!-- bottom number line (same axis) -->
  <line x1="100" y1="250" x2="580" y2="250" stroke="#073642" stroke-width="2.5"/>

  <!-- major ticks at 4..8 -->
  <line x1="100" y1="241" x2="100" y2="259" stroke="#073642" stroke-width="2"/>
  <line x1="220" y1="241" x2="220" y2="259" stroke="#073642" stroke-width="2"/>
  <line x1="340" y1="241" x2="340" y2="259" stroke="#073642" stroke-width="2"/>
  <line x1="460" y1="241" x2="460" y2="259" stroke="#073642" stroke-width="2"/>
  <line x1="580" y1="241" x2="580" y2="259" stroke="#073642" stroke-width="2"/>

  <!-- finer minor ticks (every 30 units = quarter steps) -->
  <line x1="130" y1="245" x2="130" y2="255" stroke="#93a1a1" stroke-width="1.5"/>
  <line x1="160" y1="245" x2="160" y2="255" stroke="#93a1a1" stroke-width="1.5"/>
  <line x1="190" y1="245" x2="190" y2="255" stroke="#93a1a1" stroke-width="1.5"/>
  <line x1="250" y1="245" x2="250" y2="255" stroke="#93a1a1" stroke-width="1.5"/>
  <line x1="280" y1="245" x2="280" y2="255" stroke="#93a1a1" stroke-width="1.5"/>
  <line x1="310" y1="245" x2="310" y2="255" stroke="#93a1a1" stroke-width="1.5"/>
  <line x1="370" y1="245" x2="370" y2="255" stroke="#93a1a1" stroke-width="1.5"/>
  <line x1="400" y1="245" x2="400" y2="255" stroke="#93a1a1" stroke-width="1.5"/>
  <line x1="430" y1="245" x2="430" y2="255" stroke="#93a1a1" stroke-width="1.5"/>
  <line x1="490" y1="245" x2="490" y2="255" stroke="#93a1a1" stroke-width="1.5"/>
  <line x1="520" y1="245" x2="520" y2="255" stroke="#93a1a1" stroke-width="1.5"/>
  <line x1="550" y1="245" x2="550" y2="255" stroke="#93a1a1" stroke-width="1.5"/>

  <!-- bottom tick labels -->
  <text x="100" y="282" text-anchor="middle" font-size="18" font-family="monospace" fill="#073642">4</text>
  <text x="220" y="282" text-anchor="middle" font-size="18" font-family="monospace" fill="#073642">5</text>
  <text x="340" y="282" text-anchor="middle" font-size="18" font-family="monospace" fill="#073642">6</text>
  <text x="460" y="282" text-anchor="middle" font-size="18" font-family="monospace" fill="#073642">7</text>
  <text x="580" y="282" text-anchor="middle" font-size="18" font-family="monospace" fill="#073642">8</text>

  <!-- hollow circle exactly on true value 7 -->
  <circle cx="460" cy="250" r="9" fill="#ffffff" stroke="#073642" stroke-width="2"/>
  <text x="460" y="226" text-anchor="middle" font-size="12" fill="#93a1a1">true value 7</text>

  <!-- solid cyan dot a hair to the LEFT of 7 (exaggerated gap) -->
  <circle cx="436" cy="250" r="8" fill="#2aa198"/>

  <!-- callout from the cyan dot down to the code label -->
  <line x1="436" y1="258" x2="436" y2="300" stroke="#2aa198" stroke-width="2.5"/>
  <polygon points="430,298 436,309 442,298" fill="#2aa198"/>
  <text x="200" y="325" font-size="15" font-family="monospace" fill="#073642">1 / 3 * 7 * 3</text>
  <text x="318" y="325" font-size="15" font-family="monospace" fill="#657b83">&#8594;</text>
  <text x="338" y="325" font-size="15" font-family="monospace" fill="#2aa198">6.999999999999999</text>

  <!-- ============ shared caption ============ -->
  <text x="340" y="345" text-anchor="middle" font-size="12" fill="#93a1a1">int marks the count; float marks the nearest spot it can store, not always the exact point.</text>
</svg>

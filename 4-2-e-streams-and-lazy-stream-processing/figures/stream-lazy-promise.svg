<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="-apple-system, 'Segoe UI', Helvetica, sans-serif">
  <!-- ===== title ===== -->
  <text x="350" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#073642">Link vs Stream: built nodes vs a coiled promise</text>

  <!-- ===== row labels (far left) ===== -->
  <text x="20" y="96" font-size="13" font-weight="bold" fill="#657b83">LINKED LIST</text>
  <text x="20" y="266" font-size="13" font-weight="bold" fill="#657b83">STREAM</text>

  <!-- ============================================================ -->
  <!-- TOP ROW: three real nodes, all already built                -->
  <!-- ============================================================ -->

  <!-- Node 1: first: 1 | solid-arrow cell -->
  <rect x="112" y="64" width="120" height="56" rx="10" fill="#ffffff" stroke="#073642" stroke-width="2"/>
  <line x1="190" y1="64" x2="190" y2="120" stroke="#073642" stroke-width="1.5"/>
  <text x="151" y="98" text-anchor="middle" font-size="15" font-family="monospace" fill="#073642">first: 1</text>
  <!-- pointer dot + short stub inside the rest cell -->
  <circle cx="211" cy="92" r="3.5" fill="#073642"/>

  <!-- arrow node1 -> node2 (solid, real) -->
  <line x1="211" y1="92" x2="278" y2="92" stroke="#073642" stroke-width="2.5"/>
  <polygon points="276,86 287,92 276,98" fill="#073642"/>

  <!-- Node 2: first: 5 | solid-arrow cell -->
  <rect x="288" y="64" width="120" height="56" rx="10" fill="#ffffff" stroke="#073642" stroke-width="2"/>
  <line x1="366" y1="64" x2="366" y2="120" stroke="#073642" stroke-width="1.5"/>
  <text x="327" y="98" text-anchor="middle" font-size="15" font-family="monospace" fill="#073642">first: 5</text>
  <circle cx="387" cy="92" r="3.5" fill="#073642"/>

  <!-- arrow node2 -> node3 (solid, real) -->
  <line x1="387" y1="92" x2="454" y2="92" stroke="#073642" stroke-width="2.5"/>
  <polygon points="452,86 463,92 452,98" fill="#073642"/>

  <!-- Node 3: first: 9 | rest: empty -->
  <rect x="464" y="64" width="172" height="56" rx="10" fill="#ffffff" stroke="#073642" stroke-width="2"/>
  <line x1="534" y1="64" x2="534" y2="120" stroke="#073642" stroke-width="1.5"/>
  <text x="499" y="98" text-anchor="middle" font-size="15" font-family="monospace" fill="#073642">first: 9</text>
  <!-- small inner box: rest: empty -->
  <rect x="542" y="80" width="86" height="24" rx="5" fill="#fdf6e3" stroke="#073642" stroke-width="1.5"/>
  <text x="585" y="97" text-anchor="middle" font-size="11.5" font-family="monospace" fill="#657b83">rest: empty</text>

  <!-- top row caption -->
  <text x="362" y="150" text-anchor="middle" font-size="13" fill="#93a1a1">every node already built</text>

  <!-- divider between the two worlds -->
  <line x1="20" y1="174" x2="680" y2="174" stroke="#93a1a1" stroke-width="1.2" stroke-dasharray="4 5"/>

  <!-- ============================================================ -->
  <!-- BOTTOM ROW: one real node; the rest is an unrun recipe       -->
  <!-- ============================================================ -->

  <!-- Node 1 (stream): first: 1 | compute_rest cell -->
  <rect x="112" y="220" width="150" height="56" rx="10" fill="#ffffff" stroke="#073642" stroke-width="2.5"/>
  <line x1="190" y1="220" x2="190" y2="276" stroke="#073642" stroke-width="1.5"/>
  <text x="151" y="254" text-anchor="middle" font-size="15" font-family="monospace" fill="#073642">first: 1</text>
  <text x="226" y="244" text-anchor="middle" font-size="11" font-family="monospace" fill="#dc322f">compute</text>
  <text x="226" y="256" text-anchor="middle" font-size="11" font-family="monospace" fill="#dc322f">_rest</text>

  <!-- the COIL (accent red): a few zigzag segments leaving the node -->
  <polyline points="262,248 274,236 286,260 298,236 310,260 322,236 334,260 346,244"
            fill="none" stroke="#dc322f" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- coil meets a question mark just before the ghost -->
  <text x="360" y="254" text-anchor="middle" font-size="20" font-weight="bold" fill="#dc322f">?</text>

  <!-- ghost box: rest not built yet (dashed outline, no real node) -->
  <rect x="384" y="220" width="150" height="56" rx="10" fill="none" stroke="#93a1a1" stroke-width="2" stroke-dasharray="6 5"/>
  <line x1="462" y1="220" x2="462" y2="276" stroke="#93a1a1" stroke-width="1.2" stroke-dasharray="6 5"/>
  <text x="423" y="241" text-anchor="middle" font-size="13" fill="#93a1a1">rest</text>
  <text x="423" y="258" text-anchor="middle" font-size="11.5" fill="#93a1a1">(not built</text>
  <text x="423" y="273" text-anchor="middle" font-size="11.5" fill="#93a1a1">yet)</text>
  <text x="497" y="252" text-anchor="middle" font-size="14" font-family="monospace" fill="#93a1a1">?</text>

  <!-- curved loop: pull the coil -> builds ONE more node + a faint copy of this same shape -->
  <!-- faint copy of the bottom-row node, shifted down-right, reached only by pulling -->
  <rect x="420" y="316" width="150" height="50" rx="10" fill="none" stroke="#93a1a1" stroke-width="1.6"/>
  <line x1="498" y1="316" x2="498" y2="366" stroke="#93a1a1" stroke-width="1"/>
  <text x="459" y="346" text-anchor="middle" font-size="14" font-family="monospace" fill="#93a1a1">first: 5</text>
  <!-- tiny coil glyph inside the faint copy: "+ another promise" -->
  <polyline points="512,346 520,338 528,354 536,338 544,354 552,342"
            fill="none" stroke="#dc322f" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round" opacity="0.65"/>

  <!-- curved arrow from the coil region down to the faint copy -->
  <path d="M 320 270 C 300 320, 360 352, 414 344" fill="none" stroke="#073642" stroke-width="2" stroke-dasharray="2 4"/>
  <polygon points="412,338 423,344 412,350" fill="#073642"/>
  <text x="130" y="316" font-size="12" fill="#657b83">pull</text>
  <text x="130" y="332" font-size="11.5" fill="#93a1a1">builds ONE more node</text>
  <text x="130" y="347" font-size="11.5" fill="#93a1a1">+ another promise</text>

  <!-- bottom row caption -->
  <text x="350" y="392" text-anchor="middle" font-size="13" fill="#93a1a1">one node built; the rest is an unrun recipe</text>
</svg>

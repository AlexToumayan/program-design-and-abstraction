<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 330" font-family="-apple-system, 'Segoe UI', Helvetica, sans-serif">
  <!-- removable card, above the slot -->
  <rect x="300" y="58" width="80" height="40" rx="10" fill="#ffffff" stroke="#268bd2" stroke-width="2"/>
  <text x="340" y="84" text-anchor="middle" font-size="18" font-family="monospace" fill="#073642">term</text>

  <!-- card dropping into the slot -->
  <line x1="340" y1="100" x2="340" y2="138" stroke="#268bd2" stroke-width="2.5"/>
  <polygon points="334,136 340,148 346,136" fill="#268bd2"/>

  <!-- plug-in options (to the right of the card) -->
  <text x="565" y="50" text-anchor="middle" font-size="12" fill="#93a1a1">plug-in options</text>
  <rect x="500" y="58" width="130" height="32" rx="10" fill="#ffffff" stroke="#2aa198" stroke-width="2"/>
  <text x="565" y="79" text-anchor="middle" font-size="16" font-family="monospace" fill="#073642">cube</text>
  <rect x="500" y="98" width="130" height="32" rx="10" fill="#ffffff" stroke="#2aa198" stroke-width="2"/>
  <text x="565" y="119" text-anchor="middle" font-size="16" font-family="monospace" fill="#073642">identity</text>
  <rect x="500" y="138" width="130" height="32" rx="10" fill="#ffffff" stroke="#2aa198" stroke-width="2"/>
  <text x="565" y="159" text-anchor="middle" font-size="16" font-family="monospace" fill="#073642">square</text>

  <!-- input box: n -->
  <rect x="16" y="187" width="84" height="46" rx="10" fill="#ffffff" stroke="#268bd2" stroke-width="2"/>
  <text x="58" y="217" text-anchor="middle" font-size="22" font-family="monospace" fill="#073642">n</text>
  <text x="58" y="252" text-anchor="middle" font-size="12" fill="#93a1a1">numbers in</text>

  <!-- input arrow (labeled n) -->
  <line x1="102" y1="210" x2="196" y2="210" stroke="#268bd2" stroke-width="2.5"/>
  <polygon points="194,204 206,210 194,216" fill="#268bd2"/>
  <text x="151" y="200" text-anchor="middle" font-size="13" font-family="monospace" fill="#268bd2">n</text>

  <!-- machine box -->
  <rect x="210" y="160" width="260" height="120" rx="16" fill="#fdf6e3" stroke="#073642" stroke-width="2.5"/>
  <text x="340" y="237" text-anchor="middle" font-size="28" font-family="monospace" font-weight="bold" fill="#073642">summation</text>
  <text x="340" y="262" text-anchor="middle" font-size="12" fill="#657b83">adds up one term at a time</text>

  <!-- the slot on the top edge of the machine (drawn over the box so it stays visible) -->
  <rect x="300" y="151" width="80" height="18" rx="5" fill="#ffffff" stroke="#073642" stroke-width="2.5"/>
  <text x="340" y="190" text-anchor="middle" font-size="11" fill="#657b83">term slot</text>

  <!-- output arrow (labeled the sum) -->
  <line x1="470" y1="220" x2="566" y2="220" stroke="#2aa198" stroke-width="2.5"/>
  <polygon points="564,214 576,220 564,226" fill="#2aa198"/>
  <text x="518" y="210" text-anchor="middle" font-size="13" font-family="monospace" fill="#2aa198">the sum</text>

  <!-- output box -->
  <rect x="580" y="197" width="84" height="46" rx="10" fill="#ffffff" stroke="#2aa198" stroke-width="2"/>
  <text x="622" y="227" text-anchor="middle" font-size="20" font-family="monospace" fill="#073642">total</text>
  <text x="622" y="262" text-anchor="middle" font-size="12" fill="#93a1a1">the total out</text>

  <!-- caption -->
  <text x="340" y="312" text-anchor="middle" font-size="13" fill="#93a1a1">one fixed machine, a swappable part: change term to change what gets added up.</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 470" font-family="-apple-system, 'Segoe UI', Helvetica, sans-serif">
  <text x="185" y="42" text-anchor="middle" font-size="16" font-weight="bold" fill="#073642">Client / server</text>
  <text x="525" y="42" text-anchor="middle" font-size="16" font-weight="bold" fill="#073642">Peer-to-peer</text>

  <line x1="350" y1="62" x2="350" y2="396" stroke="#93a1a1" stroke-width="1.5" stroke-dasharray="4 5"/>

  <line x1="185" y1="282" x2="185" y2="170" stroke="#268bd2" stroke-width="2"/>
  <line x1="185" y1="282" x2="80" y2="248" stroke="#268bd2" stroke-width="2"/>
  <line x1="185" y1="282" x2="122" y2="368" stroke="#268bd2" stroke-width="2"/>
  <line x1="185" y1="282" x2="248" y2="368" stroke="#268bd2" stroke-width="2"/>
  <line x1="185" y1="282" x2="290" y2="248" stroke="#268bd2" stroke-width="2"/>

  <ellipse cx="185" cy="282" rx="70" ry="55" fill="none" stroke="#dc322f" stroke-width="2" stroke-dasharray="3 4"/>

  <circle cx="185" cy="170" r="31" fill="#ffffff" stroke="#073642" stroke-width="2"/>
  <circle cx="80" cy="248" r="31" fill="#ffffff" stroke="#073642" stroke-width="2"/>
  <circle cx="122" cy="368" r="31" fill="#ffffff" stroke="#073642" stroke-width="2"/>
  <circle cx="248" cy="368" r="31" fill="#ffffff" stroke="#073642" stroke-width="2"/>
  <circle cx="290" cy="248" r="31" fill="#ffffff" stroke="#073642" stroke-width="2"/>
  <text x="185" y="174" text-anchor="middle" font-size="11" fill="#073642">Client</text>
  <text x="80" y="252" text-anchor="middle" font-size="11" fill="#073642">Client</text>
  <text x="122" y="372" text-anchor="middle" font-size="11" fill="#073642">Client</text>
  <text x="248" y="372" text-anchor="middle" font-size="11" fill="#073642">Client</text>
  <text x="290" y="252" text-anchor="middle" font-size="11" fill="#073642">Client</text>

  <rect x="143" y="254" width="84" height="56" rx="10" fill="#fdf6e3" stroke="#073642" stroke-width="2.5"/>
  <text x="185" y="288" text-anchor="middle" font-size="15" font-weight="bold" fill="#073642">Server</text>

  <line x1="525" y1="160" x2="420" y2="236" stroke="#073642" stroke-width="2"/>
  <line x1="420" y1="236" x2="461" y2="358" stroke="#073642" stroke-width="2"/>
  <line x1="461" y1="358" x2="589" y2="358" stroke="#073642" stroke-width="2"/>
  <line x1="589" y1="358" x2="630" y2="236" stroke="#073642" stroke-width="2"/>
  <line x1="630" y1="236" x2="525" y2="160" stroke="#073642" stroke-width="2"/>
  <line x1="420" y1="236" x2="589" y2="358" stroke="#073642" stroke-width="2"/>
  <line x1="461" y1="358" x2="630" y2="236" stroke="#073642" stroke-width="2"/>

  <circle cx="525" cy="160" r="31" fill="#ffffff" stroke="#073642" stroke-width="2"/>
  <circle cx="420" cy="236" r="31" fill="#ffffff" stroke="#073642" stroke-width="2"/>
  <circle cx="461" cy="358" r="31" fill="#ffffff" stroke="#073642" stroke-width="2"/>
  <circle cx="589" cy="358" r="31" fill="#ffffff" stroke="#073642" stroke-width="2"/>
  <circle cx="630" cy="236" r="31" fill="#ffffff" stroke="#073642" stroke-width="2"/>
  <text x="525" y="164" text-anchor="middle" font-size="12" fill="#073642">Peer</text>
  <text x="420" y="240" text-anchor="middle" font-size="12" fill="#073642">Peer</text>
  <text x="461" y="362" text-anchor="middle" font-size="12" fill="#073642">Peer</text>
  <text x="589" y="362" text-anchor="middle" font-size="12" fill="#073642">Peer</text>
  <text x="630" y="240" text-anchor="middle" font-size="12" fill="#073642">Peer</text>

  <text x="185" y="430" text-anchor="middle" font-size="13" fill="#93a1a1">many askers, one answerer</text>
  <text x="185" y="450" text-anchor="middle" font-size="13" fill="#dc322f">the server is a single point of failure</text>
  <text x="525" y="430" text-anchor="middle" font-size="13" fill="#93a1a1">every peer both asks and answers</text>
  <text x="525" y="450" text-anchor="middle" font-size="13" fill="#93a1a1">more peers bring more capacity</text>
</svg>

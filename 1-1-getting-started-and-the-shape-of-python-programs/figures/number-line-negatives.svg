<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 240" font-family="-apple-system, 'Segoe UI', Helvetica, sans-serif">
  <!-- number line -->
  <line x1="80" y1="160" x2="600" y2="160" stroke="#073642" stroke-width="2.5"/>

  <!-- ticks at -2 -1 0 1 2 (evenly spaced, 130 units apart) -->
  <line x1="80"  y1="151" x2="80"  y2="169" stroke="#073642" stroke-width="2"/>
  <line x1="210" y1="151" x2="210" y2="169" stroke="#073642" stroke-width="2"/>
  <line x1="340" y1="151" x2="340" y2="169" stroke="#073642" stroke-width="2"/>
  <line x1="470" y1="151" x2="470" y2="169" stroke="#073642" stroke-width="2"/>
  <line x1="600" y1="151" x2="600" y2="169" stroke="#073642" stroke-width="2"/>

  <!-- tick labels -->
  <text x="80"  y="192" text-anchor="middle" font-size="18" font-family="monospace" fill="#073642">-2</text>
  <text x="210" y="192" text-anchor="middle" font-size="18" font-family="monospace" fill="#073642">-1</text>
  <text x="340" y="192" text-anchor="middle" font-size="18" font-family="monospace" fill="#073642">0</text>
  <text x="470" y="192" text-anchor="middle" font-size="18" font-family="monospace" fill="#073642">1</text>
  <text x="600" y="192" text-anchor="middle" font-size="18" font-family="monospace" fill="#073642">2</text>

  <!-- curved arrow arcing from -1 (210) up and over to 0 (340) -->
  <path d="M 210 150 C 235 96, 315 96, 340 150" fill="none" stroke="#268bd2" stroke-width="2.5"/>
  <polygon points="333,142 343,153 327,153" fill="#268bd2"/>
  <text x="275" y="78" text-anchor="middle" font-size="13" fill="#93a1a1">minus (minus 1) means move +1 to the right</text>

  <!-- start dot on -1 -->
  <circle cx="210" cy="160" r="9" fill="#268bd2"/>
  <text x="210" y="225" text-anchor="middle" font-size="13" fill="#93a1a1">start: -1</text>

  <!-- result dot on 0 -->
  <circle cx="340" cy="160" r="9" fill="#2aa198"/>
  <text x="340" y="225" text-anchor="middle" font-size="13" fill="#93a1a1">result: 0</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="-28 -16 724 258" font-family="-apple-system, 'Segoe UI', Helvetica, sans-serif">
  <!-- input boxes -->
  <rect x="16" y="52" width="92" height="46" rx="10" fill="#ffffff" stroke="#268bd2" stroke-width="2"/>
  <text x="62" y="81" text-anchor="middle" font-size="22" font-family="monospace" fill="#073642">7.5</text>
  <rect x="16" y="142" width="92" height="46" rx="10" fill="#ffffff" stroke="#268bd2" stroke-width="2"/>
  <text x="62" y="171" text-anchor="middle" font-size="22" font-family="monospace" fill="#073642">9.5</text>
  <text x="62" y="210" text-anchor="middle" font-size="13" fill="#93a1a1">two separate inputs</text>

  <!-- input arrows -->
  <line x1="110" y1="75" x2="253" y2="83" stroke="#268bd2" stroke-width="2.5"/>
  <polygon points="251,77 262,84 250,89" fill="#268bd2"/>
  <line x1="110" y1="165" x2="253" y2="157" stroke="#268bd2" stroke-width="2.5"/>
  <polygon points="251,151 262,156 250,163" fill="#268bd2"/>

  <!-- machine box -->
  <rect x="266" y="56" width="248" height="128" rx="16" fill="#fdf6e3" stroke="#073642" stroke-width="2.5"/>
  <text x="390" y="108" text-anchor="middle" font-size="30" font-family="monospace" font-weight="bold" fill="#073642">max</text>
  <text x="390" y="136" text-anchor="middle" font-size="13" fill="#657b83">keeps the largest input</text>
  <text x="390" y="158" text-anchor="middle" font-size="11" font-style="italic" fill="#93a1a1">the machinery is hidden</text>

  <!-- output arrow -->
  <line x1="514" y1="120" x2="558" y2="120" stroke="#2aa198" stroke-width="2.5"/>
  <polygon points="556,114 567,120 556,126" fill="#2aa198"/>

  <!-- output box -->
  <rect x="569" y="97" width="92" height="46" rx="10" fill="#ffffff" stroke="#2aa198" stroke-width="2"/>
  <text x="615" y="126" text-anchor="middle" font-size="22" font-family="monospace" fill="#073642">9.5</text>
  <text x="615" y="162" text-anchor="middle" font-size="13" fill="#93a1a1">the output</text>
</svg>

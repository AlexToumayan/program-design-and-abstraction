<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 392" font-family="-apple-system, 'Segoe UI', Helvetica, sans-serif">
  <!-- terminal window -->
  <rect x="20" y="20" width="720" height="300" rx="12" fill="#002b36" stroke="#073642" stroke-width="2"/>
  <!-- title bar -->
  <path d="M 20 32 Q 20 20 32 20 L 728 20 Q 740 20 740 32 L 740 60 L 20 60 Z" fill="#073642"/>
  <circle cx="44" cy="40" r="7" fill="#ff5f56"/>
  <circle cx="68" cy="40" r="7" fill="#ffbd2e"/>
  <circle cx="92" cy="40" r="7" fill="#27c93f"/>
  <text x="380" y="45" text-anchor="middle" font-size="14" fill="#93a1a1">Terminal</text>

  <!-- line 1: version check command -->
  <text x="44" y="104" font-size="19" font-family="monospace" fill="#2aa198">$</text>
  <text x="68" y="104" font-size="19" font-family="monospace" fill="#eee8d5">python3 --version</text>
  <!-- line 2: output -->
  <text x="44" y="134" font-size="19" font-family="monospace" fill="#839496">Python 3.12.2</text>

  <!-- line 3: start the interpreter -->
  <text x="44" y="194" font-size="19" font-family="monospace" fill="#2aa198">$</text>
  <text x="68" y="194" font-size="19" font-family="monospace" fill="#eee8d5">python3</text>
  <!-- line 4: REPL expression -->
  <text x="44" y="224" font-size="19" font-family="monospace" fill="#268bd2">&gt;&gt;&gt;</text>
  <text x="92" y="224" font-size="19" font-family="monospace" fill="#eee8d5">2 + 2</text>
  <!-- line 5: REPL answer -->
  <text x="44" y="254" font-size="19" font-family="monospace" fill="#839496">4</text>
  <!-- line 6: waiting prompt + cursor -->
  <text x="44" y="284" font-size="19" font-family="monospace" fill="#268bd2">&gt;&gt;&gt;</text>
  <rect x="92" y="269" width="11" height="20" fill="#eee8d5" opacity="0.75"/>

  <!-- caption -->
  <text x="380" y="352" text-anchor="middle" font-size="14" fill="#93a1a1">First you check the version, then you start the interpreter and try one</text>
  <text x="380" y="372" text-anchor="middle" font-size="14" fill="#93a1a1">expression. The <tspan font-family="monospace" fill="#657b83">$</tspan> prompt is the shell; the <tspan font-family="monospace" fill="#657b83">&gt;&gt;&gt;</tspan> prompt is Python itself.</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="-30 -16 764 392" font-family="-apple-system, 'Segoe UI', Helvetica, sans-serif">
  <!-- context line -->
  <text x="350" y="28" text-anchor="middle" font-size="13" fill="#657b83">looking up the name</text>
  <text x="350" y="52" text-anchor="middle" font-size="20" font-family="monospace" fill="#073642">x</text>
  <text x="350" y="73" text-anchor="middle" font-size="13" fill="#657b83">while inside good_enough</text>

  <!-- INNER frame (TOP) -->
  <rect x="250" y="92" width="290" height="86" rx="14" fill="#fdf6e3" stroke="#073642" stroke-width="2.5"/>
  <text x="395" y="118" text-anchor="middle" font-size="14" font-weight="bold" fill="#073642">good_enough frame</text>
  <line x1="270" y1="130" x2="520" y2="130" stroke="#93a1a1" stroke-width="1"/>
  <text x="395" y="157" text-anchor="middle" font-size="17" font-family="monospace" fill="#073642">guess &#8594; 3.0</text>

  <!-- OUTER frame (BOTTOM) -->
  <rect x="250" y="236" width="290" height="86" rx="14" fill="#ffffff" stroke="#073642" stroke-width="2.5"/>
  <text x="395" y="262" text-anchor="middle" font-size="13" font-weight="bold" fill="#073642">sqrt frame, where good_enough was defined</text>
  <line x1="270" y1="274" x2="520" y2="274" stroke="#93a1a1" stroke-width="1"/>
  <text x="395" y="301" text-anchor="middle" font-size="17" font-family="monospace" fill="#073642">x &#8594; 9</text>

  <!-- parent link: inner frame points OUTWARD to outer frame -->
  <line x1="250" y1="135" x2="210" y2="135" stroke="#073642" stroke-width="2"/>
  <line x1="210" y1="135" x2="210" y2="279" stroke="#073642" stroke-width="2"/>
  <line x1="210" y1="279" x2="245" y2="279" stroke="#073642" stroke-width="2"/>
  <polygon points="243,273 254,279 243,285" fill="#073642"/>
  <text x="200" y="207" text-anchor="end" font-size="12" fill="#93a1a1">parent</text>

  <!-- Step 1: search the inner frame, x is not here -->
  <circle cx="600" cy="135" r="14" fill="#268bd2"/>
  <text x="600" y="140" text-anchor="middle" font-size="15" font-weight="bold" fill="#ffffff">1</text>
  <line x1="586" y1="135" x2="547" y2="135" stroke="#268bd2" stroke-width="2.5"/>
  <polygon points="549,129 538,135 549,141" fill="#268bd2"/>
  <text x="618" y="135" text-anchor="start" font-size="12" fill="#93a1a1">search the</text>
  <text x="618" y="151" text-anchor="start" font-size="12" fill="#93a1a1">inner frame</text>
  <text x="618" y="167" text-anchor="start" font-size="12" fill="#dc322f">x is not here</text>

  <!-- Step 2: follow the parent link OUTWARD to the outer frame, x is found -->
  <circle cx="600" cy="279" r="14" fill="#268bd2"/>
  <text x="600" y="284" text-anchor="middle" font-size="15" font-weight="bold" fill="#ffffff">2</text>
  <!-- blue path drops outward then into the outer frame -->
  <line x1="600" y1="149" x2="600" y2="279" stroke="#268bd2" stroke-width="2.5"/>
  <line x1="586" y1="279" x2="547" y2="279" stroke="#268bd2" stroke-width="2.5"/>
  <polygon points="549,273 538,279 549,285" fill="#268bd2"/>
  <text x="618" y="279" text-anchor="start" font-size="12" fill="#93a1a1">follow parent</text>
  <text x="618" y="295" text-anchor="start" font-size="12" fill="#93a1a1">outward</text>
  <text x="618" y="311" text-anchor="start" font-size="12" fill="#2aa198">x is found = 9</text>

  <!-- caption -->
  <text x="350" y="344" text-anchor="middle" font-size="12" fill="#93a1a1">a name not found in the inner frame is looked up outward in the frame where the function was defined.</text>
  <text x="350" y="358" text-anchor="middle" font-size="12" fill="#93a1a1">That outward walk is lexical scope.</text>
</svg>

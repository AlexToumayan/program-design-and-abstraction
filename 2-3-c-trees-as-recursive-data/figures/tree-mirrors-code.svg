<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 320" font-family="-apple-system, 'Segoe UI', Helvetica, sans-serif">
  <!-- ===================== LEFT: the tree ===================== -->
  <!-- edges: thin blue lines from each parent's bottom-center to each child's top-center -->
  <!-- root 3 -> leaf 1, node 2 -->
  <line x1="138" y1="76" x2="78" y2="128" stroke="#268bd2" stroke-width="2"/>
  <line x1="138" y1="76" x2="214" y2="128" stroke="#268bd2" stroke-width="2"/>
  <!-- node 2 -> leaf 1, leaf 1 -->
  <line x1="214" y1="168" x2="170" y2="220" stroke="#268bd2" stroke-width="2"/>
  <line x1="214" y1="168" x2="258" y2="220" stroke="#268bd2" stroke-width="2"/>

  <!-- root node: 3 (cream, dark outline) -->
  <rect x="112" y="40" width="52" height="36" rx="12" fill="#fdf6e3" stroke="#073642" stroke-width="2.5"/>
  <text x="138" y="64" text-anchor="middle" font-size="18" font-family="monospace" fill="#073642">3</text>

  <!-- branch level: leaf 1 (left) and node 2 (right) -->
  <rect x="52" y="128" width="52" height="36" rx="12" fill="#ffffff" stroke="#268bd2" stroke-width="2"/>
  <text x="78" y="152" text-anchor="middle" font-size="18" font-family="monospace" fill="#073642">1</text>
  <rect x="188" y="128" width="52" height="36" rx="12" fill="#ffffff" stroke="#268bd2" stroke-width="2"/>
  <text x="214" y="152" text-anchor="middle" font-size="18" font-family="monospace" fill="#073642">2</text>

  <!-- leaf children of node 2: 1 and 1 -->
  <rect x="144" y="220" width="52" height="36" rx="12" fill="#ffffff" stroke="#268bd2" stroke-width="2"/>
  <text x="170" y="244" text-anchor="middle" font-size="18" font-family="monospace" fill="#073642">1</text>
  <rect x="232" y="220" width="52" height="36" rx="12" fill="#ffffff" stroke="#268bd2" stroke-width="2"/>
  <text x="258" y="244" text-anchor="middle" font-size="18" font-family="monospace" fill="#073642">1</text>

  <text x="168" y="288" text-anchor="middle" font-size="12" fill="#93a1a1">a tree: a label with branches</text>

  <!-- ===================== RIGHT: the matching code ===================== -->
  <!-- outer box: def process(t): -->
  <rect x="392" y="40" width="272" height="160" rx="16" fill="#fdf6e3" stroke="#073642" stroke-width="2.5"/>
  <text x="412" y="72" font-size="17" font-family="monospace" font-weight="bold" fill="#073642">def process(t):</text>

  <!-- inner row 1: handle label(t) -->
  <rect x="412" y="88" width="232" height="38" rx="10" fill="#ffffff" stroke="#073642" stroke-width="2"/>
  <text x="528" y="112" text-anchor="middle" font-size="15" font-family="monospace" fill="#073642">handle label(t)</text>

  <!-- inner row 2: for each branch b ... process(b) -->
  <rect x="412" y="136" width="232" height="50" rx="10" fill="#ffffff" stroke="#073642" stroke-width="2"/>
  <text x="528" y="156" text-anchor="middle" font-size="13" font-family="monospace" fill="#073642">for each branch b in</text>
  <text x="528" y="175" text-anchor="middle" font-size="13" font-family="monospace" fill="#073642">branches(t): process(b)</text>

  <!-- ===================== dashed connectors: tree shape -> code shape ===================== -->
  <!-- root of the tree maps to the "handle label" row -->
  <line x1="164" y1="58" x2="412" y2="107" stroke="#073642" stroke-width="2" stroke-dasharray="7 6"/>
  <polygon points="406,100 416,108 404,112" fill="#073642"/>

  <!-- the branches map to the "for each branch" row -->
  <line x1="240" y1="146" x2="412" y2="161" stroke="#073642" stroke-width="2" stroke-dasharray="7 6"/>
  <polygon points="406,154 416,162 405,167" fill="#073642"/>

  <!-- ===================== caption ===================== -->
  <text x="340" y="306" text-anchor="middle" font-size="13" fill="#93a1a1">the code has the same shape as the tree: handle the label, then recurse on each branch.</text>
</svg>
